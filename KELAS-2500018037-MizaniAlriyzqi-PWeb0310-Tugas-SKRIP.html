<!DOCTYPE html>
<html>
<head>
    <title>Tugas HTML Tabel</title>
    <style>
        table {
            border-collapse: collapse;
            width: 70%;
            margin: 20px auto;
        }
        th, td {
            border: 1px solid black;
            padding: 10px;
            text-align: center;
        }
        th {
            background-color: lightblue;
        }
        tr:nth-child(even) {
            background-color: #f2f2f2;
        }
    </style>
</head>
<body>

<h2 align="center">Data Mahasiswa</h2>

<table>
    <tr>
        <th>No</th>
        <th>Nama</th>
        <th>NIM</th>
        <th>Kelas</th>
        <th>Jurusan</th>
    </tr>

    <tr>
        <td>1</td>
        <td>Mizani</td>
        <td>123456</td>
        <td>TI-A</td>
        <td>Teknik Informatika</td>
    </tr>

    <tr>
        <td>2</td>
        <td>Andi</td>
        <td>654321</td>
        <td>TI-B</td>
        <td>Sistem Informasi</td>
    </tr>

    <tr>
        <td>3</td>
        <td>Siti</td>
        <td>112233</td>
        <td>TI-A</td>
        <td>Teknik Informatika</td>
    </tr>

</table>

</body>
</html>
